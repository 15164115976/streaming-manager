<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直播间管理器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: white;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #fff;
      color: #667eea;
    }

    .btn-primary:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-warning {
      background: #f59e0b;
      color: white;
    }

    .btn-warning:hover {
      background: #d97706;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-header-left {
      flex: 1;
    }

    .streamer-name {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 5px;
    }

    .platform-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .platform-bilibili { background: #fb7299; color: white; }
    .platform-douyin { background: #ee1d52; color: white; }
    .platform-huya { background: #fa6a01; color: white; }
    .platform-douyu { background: #e62117; color: white; }
    .platform-twitch { background: #9146ff; color: white; }
    .platform-youtube { background: #ff0000; color: white; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .live-badge.live {
      background: #ef4444;
      color: white;
      animation: pulse 2s infinite;
    }

    .live-badge.offline {
      background: #9ca3af;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .card-body {
      padding: 15px;
    }

    .live-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .remark {
      background: #f9fafb;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 15px;
    }

    .remark:empty {
      display: none;
    }

    .progress-section {
      margin-bottom: 15px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .progress-bar {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #059669);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 15px;
    }

    .task-tag {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #f3f4f6;
      color: #4b5563;
    }

    .task-tag.done {
      background: #d1fae5;
      color: #065f46;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      display: none;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 25px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 20px;
      color: #1f2937;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: #f3f4f6;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
      color: #6b7280;
    }

    .close-btn:hover {
      background: #e5e7eb;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 25px;
    }

    .status-bar {
      background: white;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-left {
      display: flex;
      gap: 20px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .status-icon.online {
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }

    .status-icon.offline {
      background: #ef4444;
    }

    .status-text {
      font-size: 14px;
      color: #374151;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .empty-state p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .filter-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }

    .filter-tab {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      transition: all 0.3s ease;
    }

    .filter-tab.active {
      background: white;
      color: #667eea;
    }

    .filter-tab:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .filter-tab.active:hover {
      background: white;
    }

    @media (max-width: 768px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .header-actions {
        flex-wrap: wrap;
        justify-content: center;
      }

      .status-bar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎬 直播间管理器</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="checkAllLive()">🔄 刷新状态</button>
        <button class="btn btn-success" onclick="showAddModal()">➕ 添加直播间</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-left">
        <div class="status-item">
          <div class="status-icon" id="monitorStatus"></div>
          <span class="status-text" id="monitorText">监控未运行</span>
        </div>
        <div class="status-item">
          <span class="status-text">PotPlayer: <span id="potplayerStatus">未检测到</span></span>
        </div>
      </div>
      <div>
        <button class="btn btn-sm" id="monitorBtn" onclick="toggleMonitor()">启动监控</button>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-tab" data-filter="live" onclick="setFilter('live')">直播中</button>
      <button class="filter-tab" data-filter="offline" onclick="setFilter('offline')">离线</button>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索主播名称..." onkeyup="filterStreamers()">
      <button class="btn btn-primary" onclick="parseUrl()">解析链接</button>
    </div>

    <div class="cards" id="streamerCards"></div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <h3>暂无直播间</h3>
      <p>点击上方按钮添加你喜欢的主播</p>
      <button class="btn btn-primary" onclick="showAddModal()">添加直播间</button>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">添加直播间</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <form id="streamerForm">
        <input type="hidden" id="formId">
        <div class="form-group">
          <label>直播间链接</label>
          <input type="text" id="formUrl" placeholder="粘贴直播间完整链接，自动识别平台" required>
          <small style="color: #6b7280; margin-top: 5px; display: block;">支持平台：哔哩哔哩、抖音、虎牙、斗鱼、Twitch、YouTube</small>
        </div>
        <div class="form-group">
          <label>备注信息</label>
          <textarea id="formRemark" placeholder="添加备注信息（可选）"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-success">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="authModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h2>🔑 平台授权配置</h2>
        <button class="close-btn" onclick="closeAuthModal()">×</button>
      </div>
      <div style="color: #6b7280; font-size: 13px; margin-bottom: 15px;">
        配置各平台的 Cookie/Token，用于获取更准确的直播信息。Cookie 可以从浏览器开发者工具中获取。
      </div>
      <div id="authPlatforms"></div>
      <div class="form-actions">
        <button type="button" class="btn" onclick="closeAuthModal()">取消</button>
        <button type="button" class="btn btn-success" onclick="saveAllAuth()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="lightModal">
    <div class="modal">
      <div class="modal-header">
        <h2>灯牌任务管理</h2>
        <button class="close-btn" onclick="closeLightModal()">×</button>
      </div>
      <div id="lightContent">
        <div class="form-group">
          <label>当前亲密度</label>
          <input type="number" id="lightCurrentExp" value="0">
        </div>
        <div class="form-group">
          <label>目标亲密度</label>
          <input type="number" id="lightTargetExp" value="100">
        </div>
        <div class="progress-section">
          <div class="progress-label">
            <span>进度</span>
            <span id="lightProgressText">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="lightProgressBar"></div>
          </div>
        </div>
        <div class="form-group">
          <label>任务完成情况</label>
          <div class="tasks" id="lightTasks">
            <span class="task-tag" data-task="watch">观看直播</span>
            <span class="task-tag" data-task="share">分享直播间</span>
            <span class="task-tag" data-task="gift">赠送礼物</span>
            <span class="task-tag" data-task="like">点赞</span>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" onclick="closeLightModal()">取消</button>
          <button type="button" class="btn btn-success" onclick="saveLightTask()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="douyinModal">
    <div class="modal" style="max-width: 700px;">
      <div class="modal-header">
        <h2>📱 抖音关注直播间</h2>
        <button class="close-btn" onclick="closeDouyinModal()">×</button>
      </div>
      <div id="douyinLoading" style="text-align: center; padding: 20px;">
        <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
        <div>正在获取抖音关注列表...</div>
      </div>
      <div id="douyinList" style="display: none; max-height: 400px; overflow-y: auto;">
        <div style="color: #6b7280; font-size: 13px; margin-bottom: 15px;">
          找到以下开播中的主播，勾选要添加的直播间
        </div>
        <div id="douyinItems"></div>
        <div class="form-actions" style="margin-top: 20px;">
          <button type="button" class="btn" onclick="closeDouyinModal()">取消</button>
          <button type="button" class="btn btn-success" onclick="addSelectedDouyin()">添加选中的直播间</button>
        </div>
      </div>
      <div id="douyinError" style="display: none; color: #ef4444; padding: 20px; text-align: center;">
        <div style="font-size: 24px; margin-bottom: 10px;">❌</div>
        <div id="douyinErrorMessage"></div>
        <div style="font-size: 13px; color: #9ca3af; margin-top: 10px;">请先在「平台授权」中配置抖音 Cookie</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let streamers = [];
    let currentFilter = 'all';
    let editingId = null;
    let currentLightStreamerId = null;

    async function loadStreamers() {
      try {
        const response = await fetch(`${API_BASE}/streamers`);
        streamers = await response.json();
        renderStreamers();
        checkEmptyState();
      } catch (error) {
        console.error('加载直播间失败:', error);
      }
    }

    function renderStreamers() {
      const container = document.getElementById('streamerCards');
      const filtered = streamers.filter(s => {
        if (currentFilter === 'live') return s.isLive === 1;
        if (currentFilter === 'offline') return s.isLive === 0;
        return true;
      });

      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
      const searched = filtered.filter(s => 
        s.name.toLowerCase().includes(searchQuery) ||
        s.remark?.toLowerCase().includes(searchQuery)
      );

      if (searched.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = searched.map(streamer => `
        <div class="card">
          <div class="card-header">
            <div class="card-header-left">
              <div class="streamer-name">${streamer.name}</div>
              <span class="platform-badge platform-${streamer.platform}">${getPlatformName(streamer.platform)}</span>
            </div>
            <span class="live-badge ${streamer.isLive ? 'live' : 'offline'}">
              <span>${streamer.isLive ? '🔴' : '⚫'}</span>
              ${streamer.isLive ? '直播中' : '离线'}
            </span>
          </div>
          <div class="card-body">
            ${streamer.isLive && streamer.liveTitle ? `<div class="live-title">📺 ${streamer.liveTitle}</div>` : ''}
            <div class="remark">${streamer.remark || '暂无备注'}</div>
            <div class="progress-section">
              <div class="progress-label">
                <span>灯牌进度</span>
                <span id="progress-${streamer.id}">0%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="progress-bar-${streamer.id}" style="width: 0%"></div>
              </div>
            </div>
            <div class="tasks" id="tasks-${streamer.id}">
              <span class="task-tag">观看</span>
              <span class="task-tag">分享</span>
              <span class="task-tag">礼物</span>
            </div>
            <div class="card-actions">
              <label class="btn btn-sm" style="background: ${streamer.alertEnabled ? '#10b981' : '#9ca3af'}; color: white;">
                <input type="checkbox" onchange="toggleAlert(${streamer.id}, this)" ${streamer.alertEnabled ? 'checked' : ''} style="display: none;">
                提醒
              </label>
              <button class="btn btn-sm" style="background: #3b82f6; color: white;" onclick="openLightModal(${streamer.id})">
                灯牌
              </button>
              <button class="btn btn-sm btn-primary" onclick="playStream(${streamer.id})">
                🎮 播放
              </button>
              <button class="btn btn-sm" style="background: #6b7280; color: white;" onclick="editStreamer(${streamer.id})">
                编辑
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteStreamer(${streamer.id})">
                删除
              </button>
            </div>
          </div>
        </div>
      `).join('');

      loadLightTasks();
    }

    function getPlatformName(platform) {
      const names = {
        bilibili: '哔哩哔哩',
        douyin: '抖音',
        huya: '虎牙',
        douyu: '斗鱼',
        twitch: 'Twitch',
        youtube: 'YouTube'
      };
      return names[platform] || platform;
    }

    async function loadLightTasks() {
      for (const streamer of streamers) {
        try {
          const response = await fetch(`${API_BASE}/light-task/${streamer.id}`);
          const task = await response.json();
          if (task) {
            const progress = Math.min(100, Math.round((task.currentExp / task.targetExp) * 100));
            document.getElementById(`progress-${streamer.id}`).textContent = `${progress}%`;
            document.getElementById(`progress-bar-${streamer.id}`).style.width = `${progress}%`;
            
            if (task.taskProgress) {
              const tasks = JSON.parse(task.taskProgress);
              const taskElements = document.querySelectorAll(`#tasks-${streamer.id} .task-tag`);
              taskElements.forEach(el => {
                const taskName = el.textContent;
                if (tasks[taskName]) {
                  el.classList.add('done');
                }
              });
            }
          }
        } catch (e) {
          console.error('加载灯牌任务失败:', e);
        }
      }
    }

    function checkEmptyState() {
      const cards = document.getElementById('streamerCards');
      const empty = document.getElementById('emptyState');
      const filtered = streamers.filter(s => {
        if (currentFilter === 'live') return s.isLive === 1;
        if (currentFilter === 'offline') return s.isLive === 0;
        return true;
      });
      
      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
      const searched = filtered.filter(s => 
        s.name.toLowerCase().includes(searchQuery) ||
        s.remark?.toLowerCase().includes(searchQuery)
      );

      if (searched.length === 0) {
        cards.style.display = 'none';
        empty.style.display = 'block';
      } else {
        cards.style.display = 'grid';
        empty.style.display = 'none';
      }
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加直播间';
      document.getElementById('formId').value = '';
      document.getElementById('formUrl').value = '';
      document.getElementById('formRemark').value = '';
      editingId = null;
      document.getElementById('addModal').classList.add('show');
    }

    function editStreamer(id) {
      const streamer = streamers.find(s => s.id === id);
      if (!streamer) return;

      document.getElementById('modalTitle').textContent = '编辑直播间';
      document.getElementById('formId').value = streamer.id;
      document.getElementById('formUrl').value = streamer.url || '';
      document.getElementById('formRemark').value = streamer.remark || '';
      editingId = id;
      document.getElementById('addModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('show');
    }

    async function parseUrl() {
      const url = prompt('请输入直播间链接:');
      if (!url) return;

      try {
        const response = await fetch(`${API_BASE}/parse-url`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const info = await response.json();
        
        if (info.error) {
          alert('解析失败: ' + info.error);
          return;
        }
        
        if (info) {
          document.getElementById('modalTitle').textContent = '添加直播间';
          document.getElementById('formId').value = '';
          document.getElementById('formPlatform').value = info.platform;
          document.getElementById('formRoomId').value = info.roomId;
          document.getElementById('formName').value = info.name;
          document.getElementById('formUrl').value = info.url;
          document.getElementById('formRemark').value = '';
          editingId = null;
          document.getElementById('addModal').classList.add('show');
        }
      } catch (error) {
        alert('解析失败: ' + error.message);
      }
    }

    document.getElementById('streamerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = document.getElementById('formUrl').value;
      const remark = document.getElementById('formRemark').value;

      try {
        // 先解析 URL 获取信息
        const parseResponse = await fetch(`${API_BASE}/parse-url`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const info = await parseResponse.json();
        
        if (!info) {
          alert('无法解析直播间链接，请检查链接是否正确');
          return;
        }

        const data = {
          platform: info.platform,
          roomId: info.roomId,
          name: info.name,
          url: info.url,
          remark: remark
        };

        if (editingId) {
          await fetch(`${API_BASE}/streamers/${editingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        } else {
          await fetch(`${API_BASE}/streamers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        }
        closeModal();
        await loadStreamers();
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    });

    async function deleteStreamer(id) {
      if (!confirm('确定要删除这个直播间吗？')) return;

      try {
        await fetch(`${API_BASE}/streamers/${id}`, { method: 'DELETE' });
        await loadStreamers();
      } catch (error) {
        alert('删除失败: ' + error.message);
      }
    }

    async function playStream(id) {
      try {
        const response = await fetch(`${API_BASE}/streamers/${id}/play`, { method: 'POST' });
        const result = await response.json();
        if (result.success) {
          alert('PotPlayer 已启动！');
        } else {
          alert(result.error || '启动失败');
        }
      } catch (error) {
        alert('播放失败: ' + error.message);
      }
    }

    function openLightModal(streamerId) {
      currentLightStreamerId = streamerId;
      
      fetch(`${API_BASE}/light-task/${streamerId}`)
        .then(res => res.json())
        .then(task => {
          document.getElementById('lightCurrentExp').value = task?.currentExp || 0;
          document.getElementById('lightTargetExp').value = task?.targetExp || 100;
          updateLightProgress();
          
          if (task?.taskProgress) {
            const tasks = JSON.parse(task.taskProgress);
            document.querySelectorAll('#lightTasks .task-tag').forEach(el => {
              const taskName = el.textContent;
              el.classList.toggle('done', tasks[taskName]);
            });
          }
        });

      document.getElementById('lightModal').classList.add('show');
    }

    function closeLightModal() {
      document.getElementById('lightModal').classList.remove('show');
    }

    function updateLightProgress() {
      const current = parseInt(document.getElementById('lightCurrentExp').value) || 0;
      const target = parseInt(document.getElementById('lightTargetExp').value) || 100;
      const progress = Math.min(100, Math.round((current / target) * 100));
      
      document.getElementById('lightProgressText').textContent = `${progress}%`;
      document.getElementById('lightProgressBar').style.width = `${progress}%`;
    }

    document.getElementById('lightCurrentExp').addEventListener('input', updateLightProgress);
    document.getElementById('lightTargetExp').addEventListener('input', updateLightProgress);

    document.querySelectorAll('#lightTasks .task-tag').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.toggle('done');
      });
    });

    async function saveLightTask() {
      if (!currentLightStreamerId) return;

      const tasks = {};
      document.querySelectorAll('#lightTasks .task-tag').forEach(el => {
        tasks[el.textContent] = el.classList.contains('done');
      });

      const data = {
        currentExp: parseInt(document.getElementById('lightCurrentExp').value) || 0,
        targetExp: parseInt(document.getElementById('lightTargetExp').value) || 100,
        taskProgress: JSON.stringify(tasks)
      };

      try {
        await fetch(`${API_BASE}/light-task/${currentLightStreamerId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        closeLightModal();
        await loadStreamers();
      } catch (error) {
        alert('保存失败: ' + error.message);
      }
    }

    async function toggleAlert(streamerId, checkbox) {
      try {
        await fetch(`${API_BASE}/live-alert/${streamerId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: checkbox.checked ? 1 : 0 })
        });
      } catch (error) {
        checkbox.checked = !checkbox.checked;
        alert('操作失败: ' + error.message);
      }
    }

    async function showAuthModal() {
      try {
        const response = await fetch(`${API_BASE}/platform-auth`);
        const auths = await response.json();
        
        const platformNames = {
          bilibili: '哔哩哔哩',
          douyin: '抖音',
          huya: '虎牙',
          douyu: '斗鱼',
          twitch: 'Twitch',
          youtube: 'YouTube'
        };
        
        document.getElementById('authPlatforms').innerHTML = auths.map(auth => `
          <div style="margin-bottom: 20px; padding: 15px; background: #f9fafb; border-radius: 8px;">
            <div style="font-weight: 600; margin-bottom: 10px;">${platformNames[auth.platform] || auth.platform}</div>
            <div style="margin-bottom: 10px;">
              <label style="font-size: 13px; color: #374151;">Cookie</label>
              <input type="text" 
                id="auth-cookie-${auth.platform}" 
                value="${auth.cookie || ''}" 
                placeholder="从浏览器开发者工具获取"
                style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px;">
            </div>
            <div style="margin-bottom: 10px;">
              <label style="font-size: 13px; color: #374151;">Token (可选)</label>
              <input type="text" 
                id="auth-token-${auth.platform}" 
                value="${auth.token || ''}" 
                placeholder="访问令牌"
                style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px;">
            </div>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
              <input type="checkbox" 
                id="auth-enabled-${auth.platform}" 
                ${auth.enabled ? 'checked' : ''}
                style="width: 16px; height: 16px;">
              启用此平台认证
            </label>
          </div>
        `).join('');
        
        document.getElementById('authModal').classList.add('show');
      } catch (error) {
        alert('加载授权配置失败：' + error.message);
      }
    }

    function closeAuthModal() {
      document.getElementById('authModal').classList.remove('show');
    }

    async function saveAllAuth() {
      const platforms = ['bilibili', 'douyin', 'huya', 'douyu', 'twitch', 'youtube'];
      
      try {
        for (const platform of platforms) {
          const cookie = document.getElementById(`auth-cookie-${platform}`).value;
          const token = document.getElementById(`auth-token-${platform}`).value;
          const enabled = document.getElementById(`auth-enabled-${platform}`).checked ? 1 : 0;
          
          await fetch(`${API_BASE}/platform-auth/${platform}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cookie, token, enabled })
          });
        }
        closeAuthModal();
        alert('授权配置已保存！');
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    }

    async function checkAllLive() {
      try {
        await fetch(`${API_BASE}/check-all`, { method: 'POST' });
        await loadStreamers();
      } catch (error) {
        alert('刷新失败：' + error.message);
      }
    }

    async function fetchDouyinFollowing() {
      document.getElementById('douyinLoading').style.display = 'block';
      document.getElementById('douyinList').style.display = 'none';
      document.getElementById('douyinError').style.display = 'none';
      document.getElementById('douyinModal').classList.add('show');

      try {
        const response = await fetch(`${API_BASE}/douyin-following`);
        const data = await response.json();
        
        if (response.status === 400) {
          document.getElementById('douyinLoading').style.display = 'none';
          document.getElementById('douyinErrorMessage').textContent = data.error;
          document.getElementById('douyinError').style.display = 'block';
          return;
        }

        if (!data || data.length === 0) {
          document.getElementById('douyinLoading').style.display = 'none';
          document.getElementById('douyinErrorMessage').textContent = '未找到正在直播的关注主播';
          document.getElementById('douyinError').style.display = 'block';
          return;
        }

        document.getElementById('douyinItems').innerHTML = data.map((item, index) => `
          <div style="display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #e5e7eb;">
            <input type="checkbox" id="douyin-check-${index}" checked style="width: 18px; height: 18px; margin-right: 12px;">
            <div style="flex: 1;">
              <div style="font-weight: 600;">${item.name}</div>
              <div style="font-size: 13px; color: #6b7280;">${item.liveTitle}</div>
            </div>
            <div style="font-size: 13px; color: #9ca3af;">${item.viewerCount} 观看</div>
            <input type="hidden" id="douyin-url-${index}" value="${item.url}">
            <input type="hidden" id="douyin-name-${index}" value="${item.name}">
            <input type="hidden" id="douyin-roomid-${index}" value="${item.roomId}">
          </div>
        `).join('');

        document.getElementById('douyinLoading').style.display = 'none';
        document.getElementById('douyinList').style.display = 'block';
      } catch (error) {
        document.getElementById('douyinLoading').style.display = 'none';
        document.getElementById('douyinErrorMessage').textContent = '获取失败：' + error.message;
        document.getElementById('douyinError').style.display = 'block';
      }
    }

    function closeDouyinModal() {
      document.getElementById('douyinModal').classList.remove('show');
    }

    async function addSelectedDouyin() {
      const items = document.querySelectorAll('[id^="douyin-check-"]');
      let selectedCount = 0;

      for (let i = 0; i < items.length; i++) {
        if (items[i].checked) {
          const url = document.getElementById(`douyin-url-${i}`).value;
          const name = document.getElementById(`douyin-name-${i}`).value;
          const roomId = document.getElementById(`douyin-roomid-${i}`).value;

          try {
            await fetch(`${API_BASE}/streamers`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                platform: 'douyin',
                roomId: roomId,
                name: name,
                url: url,
                remark: ''
              })
            });
            selectedCount++;
          } catch (error) {
            console.error('添加失败:', error);
          }
        }
      }

      closeDouyinModal();
      await loadStreamers();
      alert(`成功添加 ${selectedCount} 个直播间！`);
    }

    async function toggleMonitor() {
      const btn = document.getElementById('monitorBtn');
      const status = document.getElementById('monitorStatus');
      const text = document.getElementById('monitorText');

      if (btn.textContent === '启动监控') {
        try {
          const response = await fetch(`${API_BASE}/start-monitor`, { method: 'POST' });
          const result = await response.json();
          if (result.success) {
            btn.textContent = '停止监控';
            btn.classList.add('btn-warning');
            status.classList.remove('offline');
            status.classList.add('online');
            text.textContent = '监控运行中';
          }
        } catch (error) {
          alert('启动失败: ' + error.message);
        }
      } else {
        try {
          const response = await fetch(`${API_BASE}/stop-monitor`, { method: 'POST' });
          const result = await response.json();
          if (result.success) {
            btn.textContent = '启动监控';
            btn.classList.remove('btn-warning');
            status.classList.remove('online');
            status.classList.add('offline');
            text.textContent = '监控未运行';
          }
        } catch (error) {
          alert('停止失败: ' + error.message);
        }
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      renderStreamers();
      checkEmptyState();
    }

    function filterStreamers() {
      renderStreamers();
      checkEmptyState();
    }

    async function checkPotPlayer() {
      try {
        const response = await fetch(`${API_BASE}/potplayer/status`);
        const status = await response.json();
        document.getElementById('potplayerStatus').textContent = 
          status.installed ? '✅ 已安装' : '❌ 未安装';
      } catch (e) {
        document.getElementById('potplayerStatus').textContent = '❌ 未检测到';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadStreamers();
      checkPotPlayer();
    });
  </script>
</body>
</html>
